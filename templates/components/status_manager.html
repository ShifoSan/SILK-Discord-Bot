        <!-- Status Manager Card -->
        <details class="accordion-panel bg-discord-dark rounded-lg shadow-lg flex flex-col" >
            <summary class="p-6 pb-4 cursor-pointer select-none border-b border-discord-darker">
                <h2 class="text-xl font-bold text-white">Status Manager</h2>
            </summary>
            <div class="p-6 pt-2">

            <form id="status-form" class="mb-6 bg-discord-darker p-4 rounded-md">
                <h3 class="text-sm font-semibold mb-3 text-gray-300">Add / Edit Status</h3>

                <div class="mb-3">
                    <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Activity Type</label>
                    <select id="status-type" class="w-full bg-discord-darkest text-white rounded p-2 focus:outline-none focus:ring-2 focus:ring-discord-blurple">

                        <option value="watching">Watching</option>

                </div>
            </div>
            </div>
