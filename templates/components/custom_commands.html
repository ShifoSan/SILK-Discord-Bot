        <!-- Custom Commands Card -->

            <summary class="p-6 pb-4 cursor-pointer select-none border-b border-discord-darker">

            <div class="p-6 pt-2">

                    <div class="mb-4">

                        <select id="cc-server-id" class="w-full bg-discord-dark border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-discord-blurple">

                    </div>
                </div>
