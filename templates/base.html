<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>S.I.L.K. AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#474646",
                        "primary-container": "#8026a7",
                        "tertiary-fixed": "#e5e2e1",
                        "tertiary-fixed-dim": "#c8c6c5",
                        "on-secondary-fixed": "#410003",
                        "on-primary-container": "#ecb4ff",
                        "background": "#131313",
                        "on-primary-fixed-variant": "#721199",
                        "on-error-container": "#ffdad6",
                        "on-surface-variant": "#cbc3d9",
                        "tertiary-container": "#545353",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed-dim": "#ebb2ff",
                        "on-error": "#690005",
                        "on-secondary-container": "#ffaea6",
                        "surface-variant": "#353535",
                        "on-secondary-fixed-variant": "#930010",
                        "secondary-fixed": "#ffdad6",
                        "secondary-fixed-dim": "#ffb3ac",
                        "inverse-primary": "#8c33b3",
                        "primary-fixed": "#f8d8ff",
                        "on-tertiary": "#313030",
                        "tertiary": "#c8c6c5",
                        "on-tertiary-fixed": "#1c1b1b",
                        "primary": "#ebb2ff",
                        "inverse-on-surface": "#303030",
                        "on-tertiary-container": "#c9c7c6",
                        "on-primary-fixed": "#320047",
                        "surface-container-lowest": "#0e0e0e",
                        "secondary": "#ffb3ac",
                        "surface-bright": "#393939",
                        "on-background": "#e2e2e2",
                        "surface-dim": "#131313",
                        "surface-container-low": "#1b1b1b",
                        "on-primary": "#520071",
                        "secondary-container": "#a40213",
                        "error": "#ffb4ab",
                        "on-surface": "#e2e2e2",
                        "outline": "#948da2",
                        "surface": "#131313",
                        "surface-container": "#1f1f1f",
                        "error-container": "#93000a",
                        "on-secondary": "#680008",
                        "outline-variant": "#494456",
                        "surface-container-highest": "#353535",
                        "inverse-surface": "#e2e2e2",
                        "surface-tint": "#ebb2ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #000000;
            color: #888888;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
        .liquid-aura-bg {
            background: radial-gradient(circle at 50% 50%, rgba(235, 178, 255, 0.08) 0%, rgba(164, 2, 19, 0.03) 50%, transparent 100%);
            pointer-events: none;
        }
        .bento-card {
            transition: transform 0.2s ease-in-out, background-color 0.2s ease-in-out;
        }
        .bento-card:hover {
            background-color: #2a2a2a;
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(235, 178, 255, 0.3);
        }
        .hollow-purple-gradient {
            background: linear-gradient(135deg, #ebb2ff 0%, #8026a7 50%, #a40213 100%);
        }
        .mechanical-press:active { transform: scale(0.98); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #131313; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }

        #mobile-menu-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 40;
            backdrop-filter: blur(4px);
        }

        #mobile-menu {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }

        #mobile-menu.open {
            transform: translateX(0);
        }
        #mobile-menu-overlay.open {
            display: block;
        }
        
        @media (min-width: 768px) {
            #mobile-menu {
                transform: translateX(0);
            }
            #mobile-menu-overlay {
                display: none !important;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-[#000000] text-[#888888] min-h-screen relative custom-scrollbar">
    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none"></canvas>
    <div class="fixed inset-0 liquid-aura-bg z-[-5]"></div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu-overlay" onclick="toggleMobileMenu()" class="md:hidden"></div>

    <!-- SideNavBar (Desktop & Mobile Drawer) -->
    <aside id="mobile-menu" class="h-screen w-64 fixed left-0 top-0 flex flex-col py-8 px-4 border-r border-[#1B1B1B] bg-[#131313] dark:bg-[#131313] z-50 md:translate-x-0 transition-transform">
        <div class="mb-12 px-2 flex justify-between items-center md:block">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
                    <span class="material-symbols-outlined text-black font-bold" data-icon="auto_awesome">auto_awesome</span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter text-white font-headline">S.I.L.K.</h1>
                    <p class="text-[10px] font-medium tracking-widest text-primary uppercase">AI Core Online</p>
                </div>
            </div>
            <button class="md:hidden text-[#888888]" onclick="toggleMobileMenu()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div class="flex flex-col gap-2 flex-grow">
            <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-150 ease-in-out {% if active_page == 'overview' %}text-[#EBB2FF] font-bold border-r-2 border-[#EBB2FF] bg-[#1B1B1B]{% else %}text-[#888888] hover:bg-[#1B1B1B] hover:text-white{% endif %}" href="/dashboard/overview">
                <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                <span class="font-medium tracking-wide">Overview</span>
            </a>
            <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-150 ease-in-out {% if active_page == 'modules' %}text-[#EBB2FF] font-bold border-r-2 border-[#EBB2FF] bg-[#1B1B1B]{% else %}text-[#888888] hover:bg-[#1B1B1B] hover:text-white{% endif %}" href="/dashboard/modules">
                <span class="material-symbols-outlined" data-icon="extension">extension</span>
                <span class="font-medium tracking-wide">Modules</span>
            </a>
            <a class="flex items-center gap-4 px-4 py-3 rounded-lg transition-all duration-150 ease-in-out {% if active_page == 'settings' %}text-[#EBB2FF] font-bold border-r-2 border-[#EBB2FF] bg-[#1B1B1B]{% else %}text-[#888888] hover:bg-[#1B1B1B] hover:text-white{% endif %}" href="/dashboard/settings">
                <span class="material-symbols-outlined" data-icon="settings">settings</span>
                <span class="font-medium tracking-wide">Settings</span>
            </a>
        </div>

        <div class="mt-auto pt-8 border-t border-[#1B1B1B]">
        </div>
    </aside>

    <!-- TopAppBar -->
    <header class="fixed top-0 right-0 w-full md:w-[calc(100%-16rem)] h-16 flex justify-between items-center px-4 md:px-8 z-30 bg-[#000000]/80 backdrop-blur-md border-b md:border-none border-[#1B1B1B]">
        <div class="flex items-center gap-4">
            <button class="md:hidden text-[#888888] hover:text-white transition-colors" onclick="toggleMobileMenu()">
                <span class="material-symbols-outlined text-2xl">menu</span>
            </button>
            <div class="flex items-center gap-4 text-xs font-medium tracking-wider hidden sm:flex">
                <span class="flex items-center gap-2 text-white"><span class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_#ebb2ff] animate-pulse"></span> Status: Active</span>
            </div>
        </div>

        <div class="flex items-center gap-4 md:gap-6">
            <!-- Global Server Selector -->
            <div class="relative">
                <select id="global-server-selector" class="bg-[#1B1B1B] border border-[#353535] rounded-lg py-1.5 px-3 text-sm text-white focus:ring-1 focus:ring-primary/30 w-40 md:w-56 appearance-none cursor-pointer outline-none">
                    <option value="">-- Select a Server --</option>
                </select>
                <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[#888888] pointer-events-none text-sm" data-icon="expand_more">expand_more</span>
            </div>

            <div class="flex items-center gap-4">
                <button class="text-[#888888] hover:text-[#EBB2FF] transition-colors hidden sm:block"><span class="material-symbols-outlined" data-icon="notifications">notifications</span></button>
                <div class="relative flex items-center gap-3">
                    <span class="text-[0.875rem] text-[#888888] hover:text-white transition-colors hidden sm:block">{{ username }}</span>
                    <button id="user-profile-btn" class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-[#1B1B1B] focus:outline-none focus:ring-2 focus:ring-[#EBB2FF]">
                        <img class="w-full h-full object-cover" alt="User Profile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCROEu4OeOM33lo27wHSnWZ2jTGndOmxWg_9s3iL8YoR_rqww6WyEtrvceGfSxTD0GUPhcHLXccslJ-dxFGQBMvyjdszezk7s60Ya7X9rLQ8bVdgUS12D1-lZJyuhboVa30uz34WO7kzXRGmlKRgM0ERLotW7TspER22xuUAf60Uz1sQwapms7omqWxHpq99pgjXyO4DiuAkXhktGgg1qwOrXsbnOBnwi3z0NwkU_VHDHNLCUs4N1BXragAYLJJssGZcFAwZ-xNuXf" />
                    </button>
                    <!-- User Icon Popover -->
                    <div id="user-popover" class="hidden absolute right-0 top-12 w-48 bg-[#131313] border border-[#1B1B1B] rounded-lg shadow-lg z-50 flex flex-col py-2">
                        <a href="/logout" class="px-4 py-2 text-sm text-[#888888] hover:text-white hover:bg-[#1B1B1B] transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm" data-icon="logout">logout</span>
                            Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Canvas -->
    <main class="md:ml-64 pt-24 pb-12 px-4 md:px-8 min-h-screen relative z-10">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-menu-overlay');
            menu.classList.toggle('open');
            overlay.classList.toggle('open');
        }
    </script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
